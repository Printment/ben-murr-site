<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ben Murr website architecture diagram</title>
  <desc id="desc">A simple architecture diagram showing how Ben Murr, Codex and ChatGPT, local development, GitHub, Vercel, IONOS DNS, Sanity Studio, and the live website connect together.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#4B5563"/>
    </marker>
    <style>
      .title { font-family: Inter, Arial, sans-serif; font-size: 32px; font-weight: 700; fill: #111827; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 16px; fill: #4B5563; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #111827; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 13px; fill: #4B5563; }
      .box { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 2; rx: 14; }
      .accent { fill: #F8FAFC; stroke: #94A3B8; stroke-width: 2; rx: 14; }
      .highlight { fill: #FEF3C7; stroke: #D97706; stroke-width: 2; rx: 14; }
      .content { fill: #ECFEFF; stroke: #0891B2; stroke-width: 2; rx: 14; }
      .line { stroke: #4B5563; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrow); }
      .guide { stroke: #D1D5DB; stroke-width: 1; stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="#F8FAFC"/>

  <text x="80" y="72" class="title">Ben Murr Website Architecture</text>
  <text x="80" y="102" class="subtitle">Simple view of the build workflow, content workflow, and live delivery path.</text>

  <line x1="80" y1="145" x2="1320" y2="145" class="guide"/>

  <text x="80" y="182" class="subtitle">Build workflow</text>

  <rect x="80" y="220" width="180" height="100" class="highlight"/>
  <text x="110" y="258" class="label">Ben Murr</text>
  <text x="110" y="286" class="small">Prompts, decisions,</text>
  <text x="110" y="306" class="small">writing, review</text>

  <rect x="330" y="220" width="220" height="100" class="box"/>
  <text x="360" y="258" class="label">Codex / ChatGPT</text>
  <text x="360" y="286" class="small">Design system, code,</text>
  <text x="360" y="306" class="small">debugging, guidance</text>

  <rect x="620" y="220" width="220" height="100" class="box"/>
  <text x="650" y="258" class="label">Local Mac / Next.js</text>
  <text x="650" y="286" class="small">Files, localhost preview,</text>
  <text x="650" y="306" class="small">Node, Git workflow</text>

  <rect x="910" y="220" width="180" height="100" class="box"/>
  <text x="940" y="258" class="label">GitHub</text>
  <text x="940" y="286" class="small">Repository, commits,</text>
  <text x="940" y="306" class="small">version control</text>

  <rect x="1160" y="220" width="160" height="100" class="box"/>
  <text x="1190" y="258" class="label">Vercel</text>
  <text x="1190" y="286" class="small">Build and deploy</text>
  <text x="1190" y="306" class="small">hosting</text>

  <path d="M260 270H330" class="line"/>
  <path d="M550 270H620" class="line"/>
  <path d="M840 270H910" class="line"/>
  <path d="M1090 270H1160" class="line"/>

  <text x="80" y="408" class="subtitle">Content workflow</text>

  <rect x="330" y="446" width="220" height="100" class="content"/>
  <text x="360" y="484" class="label">Sanity Studio</text>
  <text x="360" y="512" class="small">Categories, tags, articles,</text>
  <text x="360" y="532" class="small">images, publishing</text>

  <rect x="620" y="446" width="180" height="100" class="accent"/>
  <text x="650" y="484" class="label">Sanity API</text>
  <text x="650" y="512" class="small">Structured content</text>
  <text x="650" y="532" class="small">for the site</text>

  <rect x="910" y="446" width="180" height="100" class="accent"/>
  <text x="940" y="484" class="label">IONOS DNS</text>
  <text x="940" y="512" class="small">A record and CNAME</text>
  <text x="940" y="532" class="small">domain routing</text>

  <rect x="1160" y="446" width="160" height="100" class="highlight"/>
  <text x="1190" y="484" class="label">Live Site</text>
  <text x="1190" y="512" class="small">benmurr.com</text>
  <text x="1190" y="532" class="small">blog and pages</text>

  <path d="M260 300C260 420 280 496 330 496" class="line"/>
  <text x="130" y="392" class="small">Writes articles and uploads images</text>

  <path d="M550 496H620" class="line"/>
  <path d="M800 496H1160" class="line"/>

  <path d="M1240 320V446" class="line"/>
  <text x="1252" y="390" class="small">Deploys app</text>

  <path d="M1000 546V620H1240V546" class="line"/>
  <text x="1030" y="608" class="small">Routes domain to live site</text>

  <text x="80" y="682" class="subtitle">Supporting relationship</text>

  <rect x="80" y="720" width="220" height="100" class="accent"/>
  <text x="110" y="758" class="label">Neo-Mythic Arcade</text>
  <text x="110" y="786" class="small">Design system and visual</text>
  <text x="110" y="806" class="small">language for the site</text>

  <path d="M300 770H620V320" class="line"/>
  <text x="340" y="752" class="small">Shapes the look and feel of the build</text>

  <rect x="80" y="852" width="1240" height="1" fill="#CBD5E1"/>
</svg>
